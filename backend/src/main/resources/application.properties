spring.application.name=alanis

# ===============================================
# Configuración de conexión a base de datos para desarrollo local
# Cada integrante debe reemplazar TU_CONTRASEÑA con su propia contraseña
# Cambiar 'localhost' a la IP del servidor solo en la etapa final
# ===============================================

# URL de conexión a la base de datos
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/ferreteria_alanis?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Usuario y contraseña para conectarse a MySQL
spring.datasource.username=equipo
spring.datasource.password=1234

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Dialecto de Hibernate para MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Mostrar SQL en la consola (útil para desarrollo y depuración)
spring.jpa.show-sql=true

# Crear/actualizar tablas automáticamente según entidades JPA
# Valores posibles: none | validate | update | create | create-drop
spring.jpa.hibernate.ddl-auto=update
